<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bruly Coffee House</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --sage:        #8B937E;
    --sage-deep:   #5C6450;
    --sage-edge:   #707963;
    --ivory:       #F4F0E6;
    --coffee:      #3A2A1E;
    --clay:        #B98056;
    --line: rgba(244,240,230,0.55);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    background: radial-gradient(120% 90% at 50% 0%, var(--sage) 0%, var(--sage) 45%, var(--sage-edge) 100%);
    font-family: 'Jost', sans-serif;
    color: var(--ivory);
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    justify-content: center;
    padding: 9vw 6vw 10vw;
  }

  .page {
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    align-items: center;
    opacity: 0;
    animation: rise 0.9s ease-out forwards;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (prefers-reduced-motion: reduce) {
    .page { animation: none; opacity: 1; }
  }

  /* logo blends straight into the page — same sage tone, no card, no border */
  .logo {
    width: min(78%, 320px);
    display: block;
    margin: 0 auto;
  }

  /* thin hand-drawn divider echoing the brand's leaf sprig */
  .divider {
    width: 92px;
    height: 34px;
    margin: 6px 0 30px;
    opacity: 0.85;
  }
  .divider path {
    fill: none;
    stroke: var(--line);
    stroke-width: 1.1;
    stroke-linecap: round;
  }

  .tagline {
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    font-size: 12.5px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ivory);
    opacity: 0.78;
    margin: -4px 0 36px;
    text-align: center;
  }

  .links {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .link-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 17px 22px;
    border: 1px solid var(--line);
    border-radius: 999px;
    background: transparent;
    color: var(--ivory);
    text-decoration: none;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    font-size: 17px;
    letter-spacing: 0.05em;
    transition: background 0.35s ease, color 0.35s ease, border-color 0.35s ease, transform 0.2s ease;
  }

  .link-btn svg {
    width: 15px;
    height: 15px;
    flex-shrink: 0;
    transition: stroke 0.35s ease;
  }
  .link-btn svg path,
  .link-btn svg circle {
    stroke: var(--ivory);
    transition: stroke 0.35s ease;
  }

  .link-btn:hover,
  .link-btn:focus-visible {
    background: var(--ivory);
    color: var(--coffee);
    border-color: var(--ivory);
    transform: translateY(-1px);
  }
  .link-btn:hover svg path,
  .link-btn:hover svg circle,
  .link-btn:focus-visible svg path,
  .link-btn:focus-visible svg circle {
    stroke: var(--coffee);
  }

  .link-btn:focus-visible {
    outline: 2px solid var(--clay);
    outline-offset: 3px;
  }

  .link-btn:hover .ig-dot,
  .link-btn:focus-visible .ig-dot {
    fill: var(--coffee);
  }

  .link-btn:active { transform: translateY(0); }

  footer {
    margin-top: 48px;
    font-family: 'Jost', sans-serif;
    font-size: 10.5px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ivory);
    opacity: 0.5;
    text-align: center;
  }

  /* ---------- menu section ---------- */
  .menu-section {
    width: 100%;
    margin-top: 56px;
    padding-top: 36px;
    border-top: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    align-items: center;
    scroll-margin-top: 24px;
  }

  .menu-title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    font-size: 30px;
    letter-spacing: 0.04em;
    color: var(--ivory);
    margin: 0 0 6px;
  }

  .menu-sub {
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ivory);
    opacity: 0.65;
    margin: 0 0 28px;
    text-align: center;
  }

  .menu-gallery {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .menu-gallery img {
    width: 100%;
    display: block;
    border-radius: 14px;
    box-shadow: 0 10px 28px rgba(0,0,0,0.22);
  }
</style>
</head>
